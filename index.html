function isValidUrl(url) {
  try { const u=new URL(String(url)); return ['https:','http:'].includes(u.protocol); }
  catch { return false; }
}
function safeOpen(url) {
  if (!isValidUrl(url)) { console.warn('[CTRL+PLAY] URL bloqueada:',url); return; }
  const a=document.createElement('a');
  a.href=url; a.target='_blank'; a.rel='noopener noreferrer';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}
function safeCopy(text) {
  const s=String(text).slice(0,200);

    try { const e=document.createElement('textarea'); e.value=s; document.body.appendChild(e); e.select(); document.execCommand('copy'); document.body.removeChild(e); } catch{}

/* ══ HOOKS ══ */
function useAlert() {
  const [show,setShow]=useState(false);
  const [type,setType]=useState(null);
  useEffect(()=>{
    function ck(){
      const n=new Date(),d=n.getDay();
      if(d===0||d===6)return;
      const t=n.getHours()*60+n.getMinutes();
      if(t>=735&&t<750){setShow(true);setType('wn');}
      else if(t>=750&&t<780){setShow(true);setType('lv');}
      else{setShow(false);setType(null);}
    }
    ck(); const iv=setInterval(ck,30000); return ()=>clearInterval(iv);
  },[]);
  return{show,type,dismiss:()=>setShow(false)};
}

function AlertBanner({type,onDismiss}){
  if(!type)return null;
  return(
    <div className="alert">

          {type==='lv'?'🔴 AL AIRE — Noticias Caracol 12:30 PM':'⏰ EN 15 MIN — Noticias Caracol 12:30 PM'}

}

}

function ChannelCard({src,accent}){
  const [cp,setCp]=useState(false);
  const handleCp=e=>{e.stopPropagation();safeCopy(src.name);setCp(true);setTimeout(()=>setCp(false),1400);};
  return(
    <div className="card" style={{'--ca':accent}} onClick={()=>safeOpen(src.url)}>
      <div className="ctop">
        <div className="cn">{src.name}</div>
        {src.type&&<span className="ctp" style={{background:`${accent}18`,color:accent,border:`1px solid ${accent}44`}}>{src.type}</span>}
      </div>
      <div className="cd">{src.desc}</div>
      {src.tags&&src.tags.length>0&&<div className="ctags">{src.tags.map(t=><span key={t} className="tag">#{t}</span>)}</div>}
      <div className="cact">
        <button className="bop" onClick={e=>{e.stopPropagation();safeOpen(src.url);}}>↗ Abrir</button>
        <button className="bcp" onClick={handleCp} title="Copiar">{cp?'✓':'⎘'}</button>
      </div>
    </div>
  );
}

function SearchResults({query,allSrc}){
  const q=query.toLowerCase().trim();
  const res=allSrc.filter(s=>s.name.toLowerCase().includes(q)||s.desc.toLowerCase().includes(q)||(s.tags&&s.tags.some(t=>t.toLowerCase().includes(q))));
  if(!res.length)return(
    <div className="nores">
      <div style={{fontSize:40,marginBottom:14}}>🔍</div>
      <div style={{color:'var(--t1)',marginBottom:8}}>Sin resultados para "{query}"</div>
      <div style={{fontSize:11}}>Prueba: música, colombia, argentina, fútbol, cartoons, china, mundial...</div>
    </div>
  );
  return(
    <div>
      <div className="sh2">
        <span className="si2">🔍</span>
        <span className="st2" style={{color:'#ff8c42'}}>Búsqueda</span>
        <span className="sc">{res.length} resultado{res.length!==1?'s':''}</span>
      </div>
      <div className="grid">{res.map(s=><ChannelCard key={s.name+s.url} src={s} accent={s._a||'#7c6eff'}/>)}</div>
    </div>
  );
}

    return out;
